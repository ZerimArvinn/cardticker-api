version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cardticker-trades-db
    environment:
      POSTGRES_USER: cardticker
      POSTGRES_PASSWORD: cardticker_dev
      POSTGRES_DB: cardticker_trades
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardticker -d cardticker_trades"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cardticker-network

  api:
    build: .
    container_name: cardticker-trades-api
    environment:
      DATABASE_URL: postgresql://cardticker:cardticker_dev@postgres:5432/cardticker_trades
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cardticker-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  cardticker-network:
    driver: bridge

